<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD de Personas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f7f7f7;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        a, button {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: inline-block;
            margin-right: 5px;
        }
        .btn {
            background: #007bff;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        form p {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión de Personas</h1>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
